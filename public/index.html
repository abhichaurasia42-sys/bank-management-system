<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Infinity Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ✅ Main Content Container -->
    <div class="main-container">
        <!-- ✅ Left Half (Bank Info) -->
        <div class="left-half">
            <img src="logo.jpg" alt="Infinity Bank Logo" class="bank-logo">  <!-- ✅ Added Bank Logo -->
            <h2>Welcome to Infinity Bank</h2>
            <p>Your trusted financial partner, providing secure and seamless banking.</p>
            <p>Enjoy 24/7 customer support, easy transactions, and smart banking solutions.</p>
        </div>

        <!-- ✅ Right Half (Login Form) -->
        <div class="right-half">
            <div class="container">
                <a href="code3.html" class="top-right">Create Account</a> <!-- Fixed link name -->
                <h2>Welcome Back</h2>
                <p class="subtitle">Login to access your account</p>

                <form>
                    <div class="input-group">
                        <label for="accountNumber">Account Number:</label>
                        <input type="text" id="accountNumber" placeholder="Enter your account number" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <!-- ✅ Remember Me (Properly Aligned) -->
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Remember Me</label>
                    </div>

                    <button type="button" onclick="login()">Login</button>
                </form>

                <p><a href="forgot-password.html">Forgot Password?</a></p>
                <p id="message"></p>
            </div>
        </div>
    </div>

    <!-- ✅ Footer (Corrected to Stick to Bottom) -->
    <footer>
        <p>&copy; 2025 Infinity Bank. All rights reserved.</p>
    </footer>

    <script>


    // On any page that requires login (like the dashboard):
    localStorage.getItem("accountNumber")
 

        async function login() {
            const accountNumber = document.getElementById("accountNumber").value.trim();
            const password = document.getElementById("password").value.trim();
            const message = document.getElementById("message");

            if (!accountNumber || !password) {
                message.textContent = "Please enter both Account Number and Password.";
                message.style.color = "red";
                return;
            }

            try {
                const response = await fetch("/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ accountNumber, password })
                });

                const result = await response.json();
                message.textContent = result.message;
                message.style.color = result.success ? "green" : "red";

                if (result.success) {
                    localStorage.setItem("accountNumber", accountNumber);
                    localStorage.setItem("PASSWORD", result.password);
                    localStorage.setItem("name", result.name);
                    localStorage.setItem("balance", result.balance);
                    localStorage.setItem("transactions", JSON.stringify(result.transactions));

                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1000);
                } else if (result.redirect) {
                    setTimeout(() => {
                        window.location.href = result.redirect;
                    }, 1000);
                }
            } catch (error) {
                message.textContent = "Error connecting to server.";
                message.style.color = "red";
            }
        }
    </script>
</body>
</html>
