<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Profile - Infinity Bank</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: linear-gradient(to right, #eef2ff, #e0f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #333;
    }

    .profile-card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: #cbd5e1;
      margin: 0 auto 20px;
    }

    h2 {
      color: #1e3a8a;
      margin-bottom: 10px;
    }

    .info {
      margin: 10px 0;
      font-size: 0.95rem;
    }

    .info strong {
      color: #2563eb;
    }

    .go-dashboard {
      display: inline-block;
      margin-top: 25px;
      text-decoration: none;
      color: white;
      background-color: #22c55e;
      padding: 10px 20px;
      border-radius: 10px;
      transition: background-color 0.3s ease;
    }

    .go-dashboard:hover {
      background-color: #16a34a;
    }

    .logout {
      display: inline-block;
      margin-top: 15px;
      background: #ef4444;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>

  <div class="profile-card">
    <img src="avatar.webp" alt="Profile Picture" class="avatar" id="avatar">
    <h2 id="name">Loading...</h2>
    <div class="info"><strong>Account Number:</strong> <span id="account"></span></div>
    <div class="info"><strong>Aadhaar:</strong> <span id="aadhaar"></span></div>
    <div class="info"><strong>DOB:</strong> <span id="dob"></span></div>
    <div class="info"><strong>Email:</strong> <span id="email"></span></div>
    <div class="info"><strong>Phone:</strong> <span id="phone"></span></div>
    <div class="info"><strong>Address:</strong> <span id="address"></span></div>
    <div class="info"><strong>Balance:</strong> ₹<span id="balance"></span></div>

    <!-- Back and Logout below profile info -->
    <a href="code4.html" class="go-dashboard">← Back to Dashboard</a>
    <br>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <script>
    async function loadUserProfile() {
      try {
        const response = await fetch('users.json');
        const users = await response.json();

        const accountNumber = localStorage.getItem('accountNumber');
        const user = users[accountNumber];

        if (!user) {
          alert('User not found.');
          return;
        }

        document.getElementById('name').textContent = user.name;
        document.getElementById('account').textContent = user.accountNumber;
        document.getElementById('aadhaar').textContent = user.aadhaar;
        document.getElementById('dob').textContent = user.dob;
        document.getElementById('email').textContent = user.email;
        document.getElementById('phone').textContent = user.phone;
        document.getElementById('address').textContent = user.address;
        document.getElementById('balance').textContent = user.balance;

        if (user.avatar) {
          document.getElementById('avatar').src = user.avatar;
        }

      } catch (error) {
        console.error("Error loading profile:", error);
        alert("Failed to load user data.");
      }
    }

    function logout() {
      localStorage.clear();
      window.location.href = "index.html";
    }

    loadUserProfile();
  </script>

</body>
</html>
