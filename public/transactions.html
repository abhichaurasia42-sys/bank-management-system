<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Transaction History</title>
  <link rel="stylesheet" href="styles23.css" />
  <style>
    .container {
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ccc;
      text-align: left;
    }
    th {
      background-color: #f0f0f0;
    }
    .credit {
      color: green;
    }
    .debit {
      color: red;
    }
    .balance {
      font-weight: bold;
      color: black;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      color: #007bff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Transaction History</h1>
    <table>
      <thead>
        <tr>
          <th>Date & Time</th>
          <th>Transactions</th>
          <th>Net Balance (₹)</th>
        </tr>
      </thead>
      <tbody id="transaction-list"></tbody>
    </table>

    <p id="message"></p>
    <a href="code4.html" class="back-link">⬅ Back to Dashboard</a>
  </div>

  <script>
    const accountNumber = localStorage.getItem("accountNumber");
  
    if (!accountNumber) {
      alert("Error: Account number not found. Redirecting to login.");
      window.location.href = "index.html";
    }
  
    async function loadTransactions() {
      try {
        const response = await fetch(`/transactions?accountNumber=${encodeURIComponent(accountNumber)}`);
        const data = await response.json();
  
        if (data.success) {
          const transactionList = document.getElementById("transaction-list");
          transactionList.innerHTML = "";
  
          let balance = 0;
          const transactionsWithBalance = [];
  
          if (data.transactions.length === 0) {
            document.getElementById("message").textContent = "No transactions found.";
          } else {
            // Step 1: Process transactions in original order and track balance
            data.transactions.forEach(transaction => {
              const [dateTime, message] = transaction.split(" - ");
              let amount = 0;
              let isCredit = false;
  
              const match = message.match(/₹(\d+)/);
              if (match) {
                amount = parseInt(match[1]);
              }
  
              if (message.toLowerCase().includes("deposit")) {
                balance += amount;
                isCredit = true;
              } else if (
                message.toLowerCase().includes("withdrew") ||
                message.toLowerCase().includes("paid") ||
                message.toLowerCase().includes("recharge")|| 
                message.toLowerCase().includes("sent")
              ) {
                balance -= amount;
              }
  
              transactionsWithBalance.push({
                dateTime,
                message,
                isCredit,
                balance: balance
              });
            });
  
            // Step 2: Display transactions in reverse with correct balance
            transactionsWithBalance.reverse().forEach(tx => {
              const row = document.createElement("tr");
  
              const dateCell = document.createElement("td");
              dateCell.textContent = tx.dateTime;
  
              const messageCell = document.createElement("td");
              messageCell.textContent = tx.message;
              messageCell.className = tx.isCredit ? "credit" : "debit";
  
              const balanceCell = document.createElement("td");
              balanceCell.textContent = tx.balance;
              balanceCell.className = "balance";
  
              row.appendChild(dateCell);
              row.appendChild(messageCell);
              row.appendChild(balanceCell);
  
              transactionList.appendChild(row);
            });
          }
        } else {
          document.getElementById("message").textContent = data.message;
        }
      } catch (error) {
        console.error("Error fetching transaction history:", error);
        document.getElementById("message").textContent = "Failed to load transaction history.";
      }
    }
  
    window.onload = loadTransactions;
  </script>
  
</body>
</html>
