<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Infinity Bank</title>
    <link rel="stylesheet" href="fp.css">
</head>
<body>
    <a href="code3.html" class="top-right">Create Account</a>

    <div class="container">
        <div class="header">
            <img src="logo.jpg" alt="Bank Logo" class="logo">
            <h2>Forgot Password</h2>
        </div>
        <p class="subtitle">Recover your password securely</p>

        <form>
            <label for="accountNumber">Enter Account Number:</label>
            <input type="text" id="accountNumber" placeholder="Your Account Number" required>
            <button type="button" onclick="requestOTP()">Send OTP</button>

                
            <div id="otpSection" style="display: none;">
                <label for="new-password">Enter New Password:</label>
                <input type="password" id="new-password" placeholder="New Password" required>
                <br>
                <label for="confirm-password">Confirm New Password:</label>
                <input type="password" id="confirm-password" placeholder="Confirm Password" required>

                <br>

                <label for="otp">Enter OTP:</label>
                <input type="text" id="otp" placeholder="OTP" required>
            
                <br>
                <button type="button" onclick="verifyOTP()">Verify OTP & Change Password</button>
            </div>
        </form>

        <h3 id="passwordDisplay"></h3>
    </div>

    <footer>
        <p>&copy; 2025 Infinity Bank. All Rights Reserved.</p>
    </footer>

    <script>
        async function requestOTP() {
            const accountNumber = document.getElementById("accountNumber").value;
            if (!accountNumber) {
                alert("Please enter your account number!");
                return;
            }

            const response = await fetch("/forgot-password-request", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ accountNumber })
            });

            const result = await response.json();
            alert(result.message);

            if (result.success) {
                document.getElementById("otpSection").style.display = "block";
            }
        }

        async function verifyOTP() {
    const accountNumber = document.getElementById("accountNumber").value;
    const otp = document.getElementById("otp").value;
    const newPassword = document.getElementById("new-password").value;
    const confirmPassword = document.getElementById("confirm-password").value;

    if (!otp || !newPassword || !confirmPassword) {
        alert("Please fill all fields!");
        return;
    }

    if (newPassword.length < 8) {
        alert("Password must be at least 8 characters long.");
        return;
    }

    if (newPassword !== confirmPassword) {
        alert("Passwords do not match!");
        return;
    }

    try {
        const verifyOtpResponse = await fetch("/verify-otp", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ accountNumber, otp, newPassword }) // ✅ Send new password here
        });

        const otpResult = await verifyOtpResponse.json();

        if (otpResult.success) {
    const changeRes = await fetch("/change-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ accountNumber, newPassword })
    });

    const change = await changeRes.json();

    if (change.success) {
        alert("Password changed successfully!");
        window.location.href = "index.html";
    } else {
        alert(change.message);
    }
}
 else {
            alert(otpResult.message);
        }
    } catch (error) {
        alert("Something went wrong. Please try again later.");
        console.error(error);
    }
}

    </script>
</body>
</html>
